name: Fetch YEN Rate

on:
  # schedule:
  #   - cron: '0 */12 * * *'  # every 12 hours
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl-cffi beautifulsoup4

      - name: Fetch YEN rate
        run: python fetch_yen_rate.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yen_rates.csv
          git diff --cached --quiet || git commit -m "chore: update YEN rate $(date +'%Y-%m-%d')"
          git push
